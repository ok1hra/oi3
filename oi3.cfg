[NET_ID=02] for TrxNet if set 0x00 TrxNet disable
[YOUR_CALL=OK1HRA]
[InterlockEnable=1] 1 = interlock, 0 = ptt in
[SEQUENCERlead=0] (ms) rear RCA
[SEQUENCERtail=0]
[PAlead=10] rear RCA + pin7-DB25
[PAtail=0]
[PTTlead=10] by mode, see below
[PTTtail=210]
[PTTmodeLSB=3]     CI-V 0x00 -> PTT3 (MIC)
[PTTmodeUSB=3]     CI-V 0x01 -> PTT3 (MIC)
[PTTmodeAM=3]      CI-V 0x02 -> PTT3 (MIC)
[PTTmodeCW=3]      CI-V 0x03 -> PTT3 (MIC)
[PTTmodeRTTY=1]    CI-V 0x04 -> PTT1 (REM/FSK)
[PTTmodeFM=3]      CI-V 0x05 -> PTT3 (MIC)
[PTTmodeCWR=3]     CI-V 0x07 -> PTT3 (MIC)
[PTTmodeRTR=1]     CI-V 0x08 -> PTT1 (REM/FSK)
[PTTmodeDefault=3] fallback when CI-V mode unknown / link down
[BAND_DECODER_IN=1] 0=disable | 1=ICOM_CIV
[SERBAUD2=9600] band decoder CAT baudrate
[CIV_ADRESS=98] 56=IC746, 98=IC7610 for Icom in HEX format
[CIV_CW_VIA_CIV=1] 1 = send CW via CI-V cmd 0x17 (radio internal keyer) | 0 = local PTT+GPIO keying
[EthernetEnable=1]
[EthernetDHCP=1] 1 = DHCP, 0 = static (defaults: 192.168.1.220 / .1 / 255.255.255.0 / 8.8.8.8)
[KeyerDefaultWpm=28]      keyer WPM 5..50 (EEPROM may override)
[KeyerMode=B]             iambic mode A or B
[KeyerPaddleReverse=0]    0 = PADDLEL is dit, 1 = swap
[KeyerSidetoneHz=600]     0 = off, otherwise 300..1200 Hz
[KeyerRttyBaud=45]        45 / 50 / 75 / 100 (45 => 45.45 Bd)
[KeyerFskReverse=0]       FSK polarity: 0 = MARK=HIGH/SPACE=LOW, 1 = inverted
